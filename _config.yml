title: "Sangmin Research Notes"
description: "Curated research notes on peptide design, protein binders, molecular simulation, docking, and CADD."
url: "https://min0210.github.io"
baseurl: ""

author:
  name: "Sangmin"

markdown: kramdown
theme: minima

plugins:
  - jekyll-feed
  - jekyll-seo-tag

collections:
  posts:
    output: true

permalink: /:year/:month/:day/:title/

header_pages:
  - papers.md
  - protocol.md

exclude:
  - scripts/
  - data/
  - vendor/
  - README.md
