name: Fetch papers

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-papers:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install arxiv python-slugify

      - name: Fetch recent papers
        env:
          MAX_RESULTS: "25"
          MAX_NEW_POSTS: "5"
          LOOKBACK_DAYS: "14"
          MIN_RELEVANCE_SCORE: "4"
        run: python scripts/fetch_papers.py

      - name: Commit generated posts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _posts data/seen_papers.json
          if git diff --cached --quiet; then
            echo "No new paper posts to commit."
          else
            git commit -m "Add latest paper posts"
            git push
          fi
