name: Fetch papers

on:
  workflow_dispatch:
    inputs:
      max_new_posts:
        description: "Maximum number of new posts to create"
        required: false
        default: "3"
      min_relevance_score:
        description: "Minimum relevance score required"
        required: false
        default: "6"
      enable_crossref:
        description: "Set to 1 to include noisy Crossref journal metadata"
        required: false
        default: "0"

permissions:
  contents: write

jobs:
  fetch-papers:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install arxiv python-slugify

      - name: Fetch recent papers
        env:
          MAX_RESULTS: "25"
          MAX_NEW_POSTS: ${{ github.event.inputs.max_new_posts || '3' }}
          LOOKBACK_DAYS: "14"
          MIN_RELEVANCE_SCORE: ${{ github.event.inputs.min_relevance_score || '6' }}
          ENABLE_CROSSREF: ${{ github.event.inputs.enable_crossref || '0' }}
        run: python scripts/fetch_papers.py

      - name: Commit generated posts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _posts data/seen_papers.json
          if git diff --cached --quiet; then
            echo "No new paper posts to commit."
          else
            git commit -m "Add latest paper posts"
            git push
          fi
